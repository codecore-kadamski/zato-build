version: '3'

services:
  adminerzato:
    image: adminer:standalone
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 120s
    environment:
      VIRTUAL_HOST: adminerzato.nirvana.local|adminerzato
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_PLUGINS: 'tables-filter tinymce version-noverify'
      ADMINER_DESIGN: arcs-material
    depends_on:
      - postgres
    ports:
      - 8081:8080

  postgres:
    image: 'postgres:alpine'
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 120s
    environment:
      - POSTGRES_PASSWORD=admin
      - POSTGRES_USER=zato

  redis:
    image: redis
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          memory: 300M
        reservations:
          memory: 20M

  zato_scheduler:
    image: registry.gitlab.com/zatosource/docker-registry/cloud:3.1
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 120s
    environment:
      - VERBOSE=y
      - LB_HOSTNAME=zato_lb
      - LB_PORT=80
      - LB_AGENT_PORT=20151
      - CLUSTER_NAME=zato
      - SECRET_KEY=asasadsa
      - JWT_SECRET_KEY=asdasdsa
      - ZATO_POSITION=scheduler
      - ZATO_WEB_ADMIN_PASSWORD=admin
      - ZATO_ADMIN_INVOKE_PASSWORD=admin
      - ZATO_IDE_PUBLISHER_PASSWORD=admin
      - REDIS_HOSTNAME=redis
      - ODB_TYPE=postgresql
      - ODB_HOSTNAME=postgres
      - ODB_PORT=5432
      - ODB_NAME=zato
      - ODB_USERNAME=zato
      - ODB_PASSWORD=admin
    depends_on:
      - redis
      - postgres

  zato_bootstrap:
    image: registry.gitlab.com/zatosource/docker-registry/cloud:3.1
    environment:
      - VERBOSE=y
      - LB_HOSTNAME=zato_lb
      - LB_PORT=80
      - LB_AGENT_PORT=20151
      - CLUSTER_NAME=zato
      - SECRET_KEY=asasadsa
      - JWT_SECRET_KEY=asdasdsa
      - ZATO_POSITION=scheduler
      - ZATO_WEB_ADMIN_PASSWORD=admin
      - ZATO_ADMIN_INVOKE_PASSWORD=admin
      - ZATO_IDE_PUBLISHER_PASSWORD=admin
      - REDIS_HOSTNAME=redis
      - ODB_TYPE=postgresql
      - ODB_HOSTNAME=postgres
      - ODB_PORT=5432
      - ODB_NAME=zato
      - ODB_USERNAME=zato
      - ODB_PASSWORD=admin
    depends_on:
      - redis
      - postgres
      - zato_scheduler

  zato_server:
    deploy:
      labels:
        - traefik.enable=true
        - traefik.port=17010
        - traefik.basic.frontend.rule=Host:zato_lb
        - traefik.basic.port=17010
        - traefik.backend.healthcheck.path=/zato/ping
        - traefik.docker.network=zato_backend
        - traefik.http.middlewares.testHeader.Headers.CustomRequestHeaders.X-Auth-Token=True
        - traefik.http.middlewares.testHeader.Headers.CustomResponseHeaders.X-Auth-Token=True
    labels:
      - traefik.enable=true
      - traefik.port=17010
      - traefik.basic.frontend.rule=Host:zato_lb
      - traefik.basic.port=17010
      - traefik.backend.healthcheck.path=/zato/ping
      - traefik.docker.network=zato_backend
      - traefik.http.middlewares.testHeader.Headers.CustomRequestHeaders.X-Auth-Token=True
      - traefik.http.middlewares.testHeader.Headers.CustomResponseHeaders.X-Auth-Token=True
    image: registry.gitlab.com/zatosource/docker-registry/cloud:3.1
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 120s
    environment:
      - VERBOSE=y
      - LB_HOSTNAME=zato_lb
      - LB_PORT=80
      - LB_AGENT_PORT=20151
      - CLUSTER_NAME=zato
      - SECRET_KEY=asasadsa
      - JWT_SECRET_KEY=asdasdsa
      - ZATO_POSITION=scheduler
      - ZATO_WEB_ADMIN_PASSWORD=admin
      - ZATO_ADMIN_INVOKE_PASSWORD=admin
      - ZATO_IDE_PUBLISHER_PASSWORD=admin
      - REDIS_HOSTNAME=redis
      - ODB_TYPE=postgresql
      - ODB_HOSTNAME=postgres
      - ODB_PORT=5432
      - ODB_NAME=zato
      - ODB_USERNAME=zato
      - ODB_PASSWORD=admin

    depends_on:
      - redis
      - postgres
      - zato_scheduler
      - zato_lb
    ports:
      - 17010
    networks:
      - default
      - backend

  zato_webadmin:
    image: registry.gitlab.com/zatosource/docker-registry/cloud:3.1
    deploy:
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 120s
    environment:
      - VERBOSE=y
      - LB_HOSTNAME=zato_lb
      - LB_PORT=80
      - LB_AGENT_PORT=20151
      - CLUSTER_NAME=zato
      - SECRET_KEY=asasadsa
      - JWT_SECRET_KEY=asdasdsa
      - ZATO_POSITION=scheduler
      - ZATO_WEB_ADMIN_PASSWORD=admin
      - ZATO_ADMIN_INVOKE_PASSWORD=admin
      - ZATO_IDE_PUBLISHER_PASSWORD=admin
      - REDIS_HOSTNAME=redis
      - ODB_TYPE=postgresql
      - ODB_HOSTNAME=postgres
      - ODB_PORT=5432
      - ODB_NAME=zato
      - ODB_USERNAME=zato
      - ODB_PASSWORD=admin
    depends_on:
      - redis
      - postgres
      - zato_scheduler
      - zato_lb
      - zato_server
    ports:
      - 8183:8183

  zato_lb:
    image: traefik
    command: -l DEBUG -c /dev/null --docker --docker.domain=traefik --docker.endpoint=unix:///var/run/docker.sock --docker.watch --docker.exposedByDefault=false --api --respondingTimeouts --respondingTimeouts.readTimeout=5s --respondingTimeouts.writeTimeout=5s
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 30s
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 120s
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - 8080:8080
    # depends_on:
    #   - zato_webadmin
    #   - zato_server
    networks:
      - default
      - backend

networks:
  default:
  backend: